name: Publish Docker Image

# 触发条件：当你推送代码到 main 分支，或者在网页上手动点击时，触发这个工作流
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 允许在 GitHub 网页上手动点击运行

jobs:
  build-and-push:
    # 运行在 GitHub 提供的一台免费的 Ubuntu 虚拟机上
    runs-on: ubuntu-latest

    steps:
      # 第1步：把你的代码拉取到这台虚拟机里
      - name: Checkout repository
        uses: actions/checkout@v4

      # 第2步：安装 Docker 的构建工具（用来打包镜像）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 第3步：登录到 Docker Hub
      # ⚠️ 安全警告：密码绝对不能写在代码里！所以我们用 secrets（仓库密钥）来读取。
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 第4步：构建 Docker 镜像，并把它推送到 Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 镜像的名字将是：你的用户名/agenttodo:latest
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/agenttodo:latest
